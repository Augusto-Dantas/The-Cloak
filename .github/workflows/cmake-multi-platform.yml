name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=Release -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config Release

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dxgi-overlay-windows
        path: |
          ${{ github.workspace }}/build/bin/Release/dxgi_hook.dll
          ${{ github.workspace }}/build/bin/Release/DXGIOverlayLauncher.exe
